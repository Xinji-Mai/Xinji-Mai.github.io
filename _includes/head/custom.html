{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>

<!-- English-only display + design polish (overrides theme defaults; dark-mode safe) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* Bilingual removed: show English only */
  .i18n-zh { display: none !important; }

  /* Typography (family/size/spacing; colors left to theme for dark-mode safety) */
  html { font-size: 17px; }
  body { font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.72; -webkit-font-smoothing: antialiased; }
  h1, h2, h3, h4 { font-family: "Newsreader", Georgia, "Times New Roman", serif; font-weight: 600; letter-spacing: 0; line-height: 1.25; }
  .page__title { font-size: 2.1em; font-weight: 600; }
  .page__content h2 { font-size: 1.4em; margin: 1.8em 0 .75em; padding-bottom: .3em; border-bottom: 1px solid rgba(128,128,128,.18); }
  .page__content h3 { font-size: 1.14em; margin: 1.4em 0 .5em; }
  .page__content p, .page__content li { line-height: 1.75; }
  .page__content ul > li { margin-bottom: .3em; }

  /* Accent links */
  a, a:visited { color: #2563eb; }
  a:hover { color: #1d4ed8; }

  /* Masthead / nav */
  .masthead { border-bottom: 1px solid rgba(128,128,128,.18); box-shadow: 0 1px 6px rgba(0,0,0,.04); }
  .greedy-nav a { font-weight: 500; }
  .greedy-nav .visible-links a:before { background: #2563eb; }

  /* Author sidebar */
  .author__avatar img { max-width: 180px; border-radius: 50%; box-shadow: 0 6px 20px rgba(0,0,0,.16); }
  .author__name { font-weight: 700; font-size: 1.3em; margin: .55em 0 .2em; }
  .author__bio { font-size: .95em; }
  .author__urls { border: 1px solid rgba(128,128,128,.18); border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.05); padding: .35em 0; }
  .author__urls li { padding: .12em .9em; }
  .author__urls a:hover { color: #2563eb; text-decoration: none; }

  /* Publications / project lists */
  .archive__item-title { margin-top: 0; font-size: 1.08em; font-weight: 600; line-height: 1.4; }
  .archive__item-title a:hover { color: #2563eb; }
  .list__item .archive__item { border-bottom: 1px solid rgba(128,128,128,.14); padding-bottom: 1em; margin-bottom: .4em; }

  /* Buttons */
  .btn { border-radius: 8px; }
</style>

<!-- end custom head snippets -->
